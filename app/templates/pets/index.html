{% extends "base.html" %}
{% block content %}<section class="mx-auto max-w-7xl px-6 py-12"><div class="flex items-center justify-between"><div><h1 class="text-4xl font-black">My pets</h1><p class="mt-2 text-slate-600">Profiles, notes, vaccinations, allergies, and documents.</p></div><a class="btn-primary" href="{{ url_for('pets.create') }}">Add pet</a></div><div class="mt-8 grid gap-6 md:grid-cols-3">{% for pet in pets %}<a class="card" href="{{ url_for('pets.detail', pet_id=pet.id) }}"><div class="text-5xl">🐾</div><h2 class="mt-5 text-2xl font-black">{{ pet.name }}</h2><p class="text-slate-600">{{ pet.species }} · {{ pet.breed or 'Breed not set' }}</p><span class="tag mt-4 inline-flex">{{ pet.age_label }}</span></a>{% else %}<div class="card">No pets yet.</div>{% endfor %}</div></section>{% endblock %}
